name: Windows Cloud PC

on:
  workflow_dispatch:

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 3600

    steps:
      - name: RDP ve Kullanıcı Ayarla
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          netsh advfirewall firewall add rule name="RDP" dir=in action=allow protocol=TCP localport=3389
          Restart-Service TermService -Force

          $Password = "RdpPass123!"
          $SecurePass = ConvertTo-SecureString $Password -AsPlainText -Force
          New-LocalUser -Name "RDP" -Password $SecurePass -AccountNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member "RDP"
          
          Write-Host "======================================"
          Write-Host "KULLANICI: RDP"
          Write-Host "ŞİFRE: RdpPass123!"
          Write-Host "======================================"

      - name: Tailscale Kur ve Bağlan
        run: |
          Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi" -OutFile "tailscale.msi"
          Start-Process msiexec.exe -ArgumentList "/i tailscale.msi /quiet" -Wait
          & "C:\Program Files\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=cloudpc
          Write-Host "Tailscale bağlandı! IP'yi Tailscale uygulamasından gör."
